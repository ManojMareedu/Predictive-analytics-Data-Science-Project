name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Free-tier GitHub Actions on a public repo. No self-hosted runners.
jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Normally a no-op -- requirements.txt already pins the model-critical
          # libraries. Kept because MLflow rewrites this file on every retrain, so
          # it is the pin that cannot go stale. Same reason as the Dockerfile.
          pip install -r exported_model/requirements.txt
          pip install pytest ruff httpx

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Run tests
        # The API tests self-skip if exported_model/ is absent, so this stays green
        # on a branch that has not retrained.
        run: pytest -q

  docker:
    name: Build image & smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t tablespreads-api:ci .

      - name: Run container
        run: docker run -d --name api -p 8000:8000 tablespreads-api:ci

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "API healthy"; exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"; docker logs api; exit 1

      - name: Smoke test /predict
        run: |
          curl -fs -X POST http://localhost:8000/predict \
            -H 'Content-Type: application/json' \
            -d '{"price_per_unit_no_merch":3.49,"price_per_unit_any_merch":2.99,
                 "price_per_volume_no_merch":3.49,"price_per_volume_any_merch":2.99,
                 "acv_distribution_no_merch":65.0,"acv_distribution_any_merch":40.0,
                 "year":2022,"week":26,"brand":"BLUEBONNET",
                 "geography":"Great Lakes - IRI Standard - Multi Outlet + Conv"}' | tee /dev/stderr | grep -q predicted_unit_sales

      - name: Container logs on failure
        if: failure()
        run: docker logs api
