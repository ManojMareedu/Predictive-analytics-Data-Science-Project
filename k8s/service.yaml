apiVersion: v1
kind: Service
metadata:
  name: tablespreads-api
  labels:
    app: tablespreads-api
spec:
  # ClusterIP, not LoadBalancer: a local cluster has no cloud LB to provision,
  # and port-forward is the zero-cost way in.
  type: ClusterIP
  selector:
    app: tablespreads-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
